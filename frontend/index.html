<!DOCTYPE html>
<html>
<head>
    <title>Train Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== Authentication Section ========== -->
<div id="auth-section" class="auth-section">
    <!-- Login Form -->
    <div id="login-box" class="auth-box">
        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username or Email">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        <div id="login-message" class="message"></div>
    </div>

    <!-- Register Form (hidden at first) -->
    <div id="register-box" class="auth-box" style="display:none">
        <h2>Register</h2>
        <input type="text" id="reg-fullname" placeholder="Full Name">
        <input type="text" id="reg-username" placeholder="Username">
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-password" placeholder="Password">
        <input type="text" id="reg-phone" placeholder="Phone">
        <button onclick="register()">Register</button>
        <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        <div id="register-message" class="message"></div>
    </div>
</div>

<!-- ========== ORIGINAL APP SECTION (hidden until login) ========== -->
<div id="app-section" style="display:none">
    <!-- User info bar -->
    <div class="user-bar">
        <span>Welcome, <span id="user-name"></span>!</span>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
    
    <h1>Train Ticket Booking</h1>

    <!-- Search Form -->
    <input id="source" placeholder="Source">
    <input id="destination" placeholder="Destination">
    <button onclick="searchTrains()">Search</button>

    <div id="results"></div>
    
    <!-- My Bookings Section -->
    <h2>My Bookings</h2>
    <div id="my-bookings"></div>
</div>

<script src="script.js"></script>
</body>
</html>
